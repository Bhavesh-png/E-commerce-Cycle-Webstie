<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Patil Adventures</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="logo">PATIL ADVENTURES</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="firefox.html">Firefox</a>
            <a href="hero.html">Hero</a>
            <a href="lectro.html">Lectro</a>
            <a href="emotorad.html">E-Motorad</a>
            <a href="contact.html" style="color:var(--primary)">Contact</a>
            <button class="cart-btn">
                Buy (<span id="cartNum">0</span>)
            </button>
        </div>
    </nav>

    <div class="container fade-in" style="margin-top: 80px;">
        <div class="contact-grid">
            <div class="contact-info">
                <h2>GET IN TOUCH</h2>
                <div class="info-item">
                    <h4>SHOP NAME</h4>
                    <p>Patil Adventures Cycle Centre</p>
                </div>
                <div class="info-item">
                    <h4>ADDRESS</h4>
                    <p>Main Road, Near City Square,<br>Maharashtra, India</p>
                </div>
                <div class="info-item">
                    <h4>CONTACT</h4>
                    <p>Phone: +91 98XXX XXXXX<br>Email: hello@patiladventures.com</p>
                </div>
                <div class="info-item">
                    <h4>WORKING HOURS</h4>
                    <p>Monday - Sunday<br>9:00 AM – 9:00 PM</p>
                </div>
            </div>

            <div class="contact-form">
                <form
                    onsubmit="event.preventDefault(); alert('Message sent successfully! We will get back to you soon.'); this.reset();">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="How can we help you today?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">SEND MESSAGE</button>
                </form>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
